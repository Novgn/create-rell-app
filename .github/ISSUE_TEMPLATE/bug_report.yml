name: Bug report
description: Report a bug in the CLI or generated templates
title: "[bug] "
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: create-rell-app version
      description: Output of `create-rell-app --version`
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      description: Output of `node --version`
    validations:
      required: true
  - type: dropdown
    id: template
    attributes:
      label: Template
      options:
        - web
        - mobile
        - monolith
        - N/A (CLI-only issue)
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact commands you ran and what happened
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
