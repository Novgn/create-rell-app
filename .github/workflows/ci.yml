# CI pipeline for create-rell-app (Story 6.2).
#
# Two jobs run in sequence:
#
#   check  — fast (~30s): typecheck + lint + unit tests on ubuntu
#   smoke  — slow (~10m): scaffold all 3 templates, install, build, lint,
#            typecheck per-template on ubuntu + macos
#
# The smoke job only runs if check passes so we don't waste runner minutes
# on template validation when the CLI source itself is broken.

name: CI

on:
  push:
    # Include every branch except the dependabot-owned ones. Dependabot
    # already triggers the same CI run via the `pull_request` event below,
    # so including the push trigger too would fire CI twice per PR. GitHub
    # Actions rejects using both `branches` and `branches-ignore` on the
    # same trigger (they're mutually exclusive), so we express the
    # exclusion with a leading `!` negation pattern inside the `branches`
    # list instead.
    branches:
      - '**'
      - '!dependabot/**'
  pull_request:
    branches: [main]

# Cancel in-flight CI runs when a newer commit lands on the same branch.
# Saves runner minutes on force-pushes and rapid iteration.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Disable Husky's `prepare` hook in CI — the runner's checkout is not
  # an interactive git repo and we don't need commit hooks here.
  HUSKY: '0'

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Fast checks: CLI source quality
  # ──────────────────────────────────────────────────────────────────────
  check:
    name: Typecheck · Lint · Unit tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ['22', '24']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests with coverage
        run: npm run test:coverage

  # ──────────────────────────────────────────────────────────────────────
  # Smoke tests: scaffold + install + build + lint + typecheck per template
  # ──────────────────────────────────────────────────────────────────────
  smoke:
    name: Smoke (${{ matrix.os }})
    needs: check
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm run test:smoke
